name: Build Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  patch:
    name: Build patch zip
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        shell: powershell

      - name: Build TypeScript
        run: npm run build
        shell: powershell

      - name: Create patch zip
        run: Compress-Archive -Path "dist", "package.json" -DestinationPath "FacturPro-Patch.zip" -Force
        shell: powershell

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FacturPro-Patch
          path: FacturPro-Patch.zip
          retention-days: 30

      - name: Publish to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          gh release view "$tag" > /dev/null 2>&1 || gh release create "$tag" --title "$tag" --notes "" --latest
          gh release upload "$tag" FacturPro-Patch.zip --clobber
        shell: bash
