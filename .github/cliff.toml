# git-cliff — configuration du changelog automatique
# Doc : https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

Toutes les modifications notables sont documentées ici.
Versionnage : `MAJEUR.MINEUR.BUILD` (BUILD = nombre de commits sur `main`).

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Non publié]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}\
- {{ commit.message | upper_first | trim }}\
{% if commit.breaking %} ⚠️ BREAKING{% endif %}
{% endfor %}
{% endfor %}\n
"""
footer = """
{% for release in releases -%}
[{{ release.version | trim_start_matches(pat="v") }}]: \
  https://github.com/swarmnode/saas-facturation/releases/tag/{{ release.version }}
{% endfor %}
"""
trim = true

[git]
conventional_commits = false
filter_unconventional = false
commit_parsers = [
  { message = "^feat",                     group = "Ajouté"        },
  { message = "^fix",                      group = "Corrigé"       },
  { message = "^docs",                     group = "Documentation" },
  { message = "^refactor",                 group = "Refactoring"   },
  { message = "^perf",                     group = "Performance"   },
  { message = "^[Bb]ump|dependabot",       group = "Dépendances"   },
  { message = "^[Mm]erge",                 skip  = true            },
  { message = "\\[skip ci\\]",             skip  = true            },
  { message = "update CHANGELOG",          skip  = true            },
  { message = ".*",                        group = "Modifications" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
topo_order = false
sort_commits = "oldest"
