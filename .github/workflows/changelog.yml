name: Changelog

on:
  push:
    branches: [main]
    paths-ignore:
      - CHANGELOG.md   # évite la boucle infinie

jobs:
  changelog:
    name: Régénérer CHANGELOG.md
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # historique complet requis par git-cliff
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Installer git-cliff
        run: |
          CLIFF_VER=$(curl -sI https://github.com/orhun/git-cliff/releases/latest \
            | grep -i '^location:' | sed 's|.*/v||' | tr -d '\r\n ')
          echo "git-cliff version: $CLIFF_VER"
          curl -sSfL \
            "https://github.com/orhun/git-cliff/releases/download/v${CLIFF_VER}/git-cliff-${CLIFF_VER}-x86_64-unknown-linux-musl.tar.gz" \
            | tar xz --wildcards '*/git-cliff' --strip-components=1
          sudo mv git-cliff /usr/local/bin/git-cliff
          git-cliff --version

      - name: Générer le changelog
        run: git-cliff --config .github/cliff.toml --verbose --output CHANGELOG.md

      - name: Commit si modifié
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet && echo "Aucun changement" && exit 0
          git commit -m "docs: update CHANGELOG.md [skip ci]"
          git push
