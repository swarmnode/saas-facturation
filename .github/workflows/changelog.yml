name: Changelog

on:
  push:
    branches: [main]
    paths-ignore:
      - CHANGELOG.md   # évite la boucle infinie

jobs:
  changelog:
    name: Régénérer CHANGELOG.md
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # historique complet requis par git-cliff
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Installer git-cliff
        run: |
          curl -sSfL https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-x86_64-unknown-linux-musl.tar.gz \
            | tar xz --strip-components=1 -C /tmp git-cliff-x86_64-unknown-linux-musl/git-cliff
          sudo mv /tmp/git-cliff /usr/local/bin/git-cliff

      - name: Générer le changelog
        run: git-cliff --config .github/cliff.toml --verbose --output CHANGELOG.md

      - name: Commit si modifié
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet && echo "Aucun changement" && exit 0
          git commit -m "docs: update CHANGELOG.md [skip ci]"
          git push
